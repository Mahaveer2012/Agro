<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Login</title>
</head>
<body>
    <div class="login" style="background-image: url(Assets/NameImage.jpg);background-size: cover;background-position: center;">
        <div class="container">
            <div class="Login-description">
        <img class="logo-title" alt="logo" src="Assets/logo.jpeg"></img>
            <h1>AgriGo...</h1>
            </div>
            <br>
            <p style="text-align: center; font-weight: 400;">"Welcome back! Access your Agrigo account to buy or sell fresh farm products"</p>

            <div class="Login-details">
               <form action="LoginServlet" method="post">
                    <label for="email">Email :</label>
                    <input type="email" id="email" name="email" placeholder="user@agro.com..." required>
                    <br>
                    <br>
                    <label for="password">Password :</label>
                    <input type="password" id="password" name="password" placeholder="ab#1223" required>

                    <br>
                    <br>
                    
                    <div class="role-selection">
                    <p>Login as:</p>
		                    <div class="radio-group">
		                        <input type="radio" id="customer" name="uRole" value="customer" checked>
		                        <label for="customer">👤 Customer</label>
		
		                        <input type="radio" id="farmer" name="uRole" value="farmer">
		                        <label for="farmer">🚜 Farmer</label>
		                    </div>
		                    </div>
							
                    <div class="log-in-main">
                        <button type="submit" class="Log-in" style="cursor: pointer; border: none;">Log in</button>
                        <br>
                        <br>
                        <p>Not Registered? <a href="signUp.html" style="text-decoration: none; color: #22c55e;">Sign up..</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
